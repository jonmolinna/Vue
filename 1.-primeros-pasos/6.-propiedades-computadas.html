<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>

    <div id="app" class="container">
        <h3>{{ mensaje }}</h3>
        <h3>invertido: {{invertido}}</h3>
        <input type="text" class="form-control" v-model="mensaje">

        <hr />
        <button class="btn btn-primary" @click="contador++">+</button>
        <button class="btn btn-danger" @click="contador--">-</button>
        
        <h3>{{contador}}</h3>
        <div class="progress">
            <div 
                class="progress-bar" 
                role="progressbar" 
                :style="{'width': contador+'%'}" 
                aria-valuenow="25" 
                aria-valuemin="0" 
                aria-valuemax="100"
                :class="color"
            >
                {{contador}}
            </div>
        </div>

    </div>

    <!-- CDN VUE -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>

    <!-- JS -->
    <script src="6.-propiedades-computadas.js"></script>
    
</body>
</html>
