<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!-- CDN VUE -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>

    <!-- CDN VUEX -->
    <script src="https://unpkg.com/vuex@3.6.2/dist/vuex.js"></script>
</head>
<body>

    <div id="app" class="container">
        <titulo></titulo>
    </div>

    <script>

        // Creando un Componente
        Vue.component('titulo', {
            template: //html
            `
            <div>
                <h1>numero: {{ numero }}</h1>
                <hijo></hijo>
            </div>
            `,
            computed: {
                ...Vuex.mapState(['numero'])
            }
        }); 
        
        // Creando un segundo Componente
        Vue.component('hijo', {
            template: //html
            `
            <div>
                <button class="btn btn-success" @click="aumentar">+</button>
                <button class="btn btn-success" @click="disminuir(2)">-</button>
                <button class="btn btn-success" @click="obtenerCursos">Obtener Cursos</button>
                <h1>numero: {{ numero }}</h1>
                <ul v-for="item of cursos">
                    <li>{{ item.nombre }}</li>
                </ul>
            </div>
            `,
            computed: {
                ...Vuex.mapState(['numero', 'cursos'])
            },
            methods: {
                ...Vuex.mapMutations(['aumentar', 'disminuir']),
                ...Vuex.mapActions(['obtenerCursos'])
            }
        });

        // Vuex
        const store = new Vuex.Store({
            state: {
                numero: 10,
                cursos: [],
            },
            mutations: {
                aumentar(state){
                    state.numero ++
                },
                disminuir(state, n){
                    state.numero -= n
                },
                llenarCursos(state, cursosAccion){
                    state.cursos = cursosAccion
                },
            },
            actions: {
                obtenerCursos: async function({ commit }){
                    const data = await fetch('cursos.json');
                    const cursos = await data.json();
                    commit('llenarCursos', cursos)
                }
            }
        });

        // Principal
        new Vue({
            el: '#app',
            store: store
        });



        // ------------------------------------------
        // 1.-mapState
        // 2.-mapMutation y Parámetros en Mutation
        // 3.- Action y mapAction

    </script>
    
</body>
</html>
